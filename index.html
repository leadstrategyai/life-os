<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 Life OS — Santi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #080808;
      --card:     #111111;
      --row-h:    #161616;
      --border:   rgba(255,255,255,0.07);
      --border-h: rgba(255,255,255,0.14);
      --text:     #e2e2e2;
      --sub:      #555;
      --sub-l:    #777;

      --agencia:   #4f9eff;
      --trabajo:   #a855f7;
      --ejercicio: #22c55e;
      --lectura:   #f97316;
      --finanzas:  #eab308;
      --personal:  #ec4899;

      --red:   #ef4444;
      --amber: #f97316;
      --r: 12px;
      --rs: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      max-width: 1300px;
      margin: 0 auto;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px 24px;
      margin-bottom: 16px;
    }
    .h-brand h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
    .h-brand .date { font-size: 12px; color: var(--sub-l); margin-top: 2px; }
    .h-stats { display: flex; gap: 24px; }
    .stat { text-align: center; }
    .stat .n { font-size: 26px; font-weight: 700; line-height: 1; display: block; }
    .stat .l { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--sub); margin-top: 3px; }
    .stat.crit .n { color: var(--red); }
    .stat.alta .n { color: var(--amber); }
    .h-actions { display: flex; gap: 8px; }
    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--sub-l);
      width: 36px; height: 36px;
      border-radius: var(--rs);
      cursor: pointer;
      font-size: 16px;
      transition: all .2s;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
    }
    .icon-btn:hover { border-color: var(--border-h); color: white; }
    .spinning { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FILTERS ────────────────────────────── */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .filter-select, .filter-input {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--rs);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color .2s;
    }
    .filter-select:hover, .filter-input:hover,
    .filter-select:focus, .filter-input:focus {
      border-color: var(--border-h);
    }
    .filter-input { flex: 1; min-width: 180px; }
    .filter-input::placeholder { color: var(--sub); }
    .filter-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--sub);
      display: flex;
      align-items: center;
    }

    /* ── OBJECTIVES ACCORDION ───────────────── */
    .objectives-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .objectives-toggle {
      width: 100%;
      background: none;
      border: none;
      color: var(--sub-l);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      padding: 14px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
      transition: color .2s;
    }
    .objectives-toggle:hover { color: var(--text); }
    .objectives-toggle .arrow { margin-left: auto; transition: transform .2s; }
    .objectives-toggle.open .arrow { transform: rotate(180deg); }
    .objectives-body {
      display: none;
      padding: 0 20px 16px;
    }
    .objectives-body.open { display: block; }
    .obj-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    .obj-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      border-radius: var(--rs);
      padding: 10px 12px;
    }
    .obj-area-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .obj-timeframe {
      font-size: 10px;
      color: var(--sub);
      margin-bottom: 4px;
    }
    .obj-text { font-size: 13px; line-height: 1.4; }

    /* ── TASK TABLE ─────────────────────────── */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }
    .table-header {
      display: grid;
      grid-template-columns: 44px 1fr 130px 150px 100px 80px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--sub);
    }
    .task-row {
      display: grid;
      grid-template-columns: 44px 1fr 130px 150px 100px 80px;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      min-height: 52px;
      transition: background .15s, opacity .3s;
    }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: var(--row-h); }
    .task-row.done {
      opacity: 0.35;
      pointer-events: none;
    }
    .task-row.done .task-name { text-decoration: line-through; }

    /* check button */
    .check-btn {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid var(--sub);
      background: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
      color: transparent;
      font-size: 13px;
    }
    .check-btn:hover {
      border-color: #22c55e;
      background: rgba(34,197,94,.1);
      color: #22c55e;
    }
    .check-btn.checking {
      border-color: #22c55e;
      background: rgba(34,197,94,.2);
      color: #22c55e;
      animation: pulse .4s ease;
    }
    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* task name cell */
    .task-name-cell {}
    .task-name { font-size: 14px; line-height: 1.4; padding: 14px 0; }
    .task-notes { font-size: 11px; color: var(--sub); margin-top: 1px; }

    /* area badge */
    .area-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      width: fit-content;
    }
    .area-dot { width: 6px; height: 6px; border-radius: 50%; }

    /* client cell */
    .client-cell { font-size: 13px; color: var(--sub-l); }

    /* priority badge */
    .prio-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
    }
    .prio-dot { width: 7px; height: 7px; border-radius: 50%; }
    .prio-Crítica .prio-dot { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .prio-Alta    .prio-dot { background: var(--amber); }
    .prio-Normal  .prio-dot { background: var(--sub); }
    .prio-Crítica { color: var(--red); }
    .prio-Alta    { color: var(--amber); }
    .prio-Normal  { color: var(--sub-l); }

    /* date cell */
    .date-cell { font-size: 12px; color: var(--sub-l); }
    .date-past { color: var(--red); }

    /* empty / loading */
    .empty-row {
      padding: 40px 20px;
      text-align: center;
      color: var(--sub);
      font-size: 14px;
    }
    .empty-row a { color: var(--sub-l); border-bottom: 1px dashed; }

    /* table footer */
    .table-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--sub);
    }
    .table-footer a {
      color: var(--agencia);
      text-decoration: none;
      font-size: 12px;
    }
    .table-footer a:hover { text-decoration: underline; }

    /* toast */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: var(--rs);
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transform: translateY(8px);
      transition: all .25s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: rgba(34,197,94,.3); }
    .toast.error   { border-color: rgba(239,68,68,.3); }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────── -->
<header>
  <div class="h-brand">
    <h1>🧠 Life OS — Santi</h1>
    <div class="date" id="current-date"></div>
  </div>
  <div class="h-stats">
    <div class="stat">
      <span class="n" id="stat-total">—</span>
      <span class="l">pendientes</span>
    </div>
    <div class="stat crit">
      <span class="n" id="stat-crit">—</span>
      <span class="l">críticas</span>
    </div>
    <div class="stat alta">
      <span class="n" id="stat-alta">—</span>
      <span class="l">altas</span>
    </div>
  </div>
  <div class="h-actions">
    <button class="icon-btn" id="refresh-btn" onclick="loadDashboard()" title="Actualizar">↻</button>
    <a class="icon-btn" href="https://app.notion.com/p/38f722e4afcf81d5b83ec99ee67b5fd2" target="_blank" title="Abrir Notion">N</a>
  </div>
</header>

<!-- ── OBJECTIVES ACCORDION ────────────────────── -->
<div class="objectives-section" id="obj-section" style="display:none">
  <button class="objectives-toggle" id="obj-toggle" onclick="toggleObjectives()">
    🎯 Objetivos
    <span class="arrow">▾</span>
  </button>
  <div class="objectives-body" id="obj-body">
    <div class="obj-grid" id="obj-grid"></div>
  </div>
</div>

<!-- ── FILTERS ──────────────────────────────────── -->
<div class="filters">
  <select class="filter-select" id="filter-area" onchange="applyFilters()">
    <option value="">Todas las áreas</option>
    <option value="Agencia">🏢 Agencia</option>
    <option value="Trabajo">💼 Trabajo</option>
    <option value="Ejercicio">💪 Ejercicio</option>
    <option value="Lectura">📚 Lectura</option>
    <option value="Finanzas">💰 Finanzas</option>
    <option value="Personal">🏠 Personal</option>
  </select>
  <select class="filter-select" id="filter-prio" onchange="applyFilters()">
    <option value="">Todas las prioridades</option>
    <option value="Crítica">🔴 Crítica</option>
    <option value="Alta">🟠 Alta</option>
    <option value="Normal">⚪ Normal</option>
  </select>
  <input class="filter-input" id="filter-search" placeholder="🔍 Buscar tarea..." oninput="applyFilters()" />
  <span class="filter-count" id="filter-count"></span>
</div>

<!-- ── TASK TABLE ────────────────────────────────── -->
<div class="table-card">
  <div class="table-header">
    <div></div>
    <div>Tarea</div>
    <div>Área</div>
    <div>Cliente</div>
    <div>Prioridad</div>
    <div>Fecha</div>
  </div>
  <div id="task-list">
    <div class="empty-row">Cargando tareas...</div>
  </div>
  <div class="table-footer">
    <span id="footer-count"></span>
    <a href="https://app.notion.com/p/85993516ae2f4829ade9be901fbea137" target="_blank">+ Agregar tarea en Notion →</a>
  </div>
</div>

<!-- ── TOAST ─────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════
const DB = {
  clientes:  'bbeedd0068e640518c707ef9c9721b5c',
  objetivos: '6020a66ec0954a489031516597ac9fb1',
  tareas:    '85993516ae2f4829ade9be901fbea137',
};

const AREA_COLORS = {
  Agencia:   '#4f9eff',
  Trabajo:   '#a855f7',
  Ejercicio: '#22c55e',
  Lectura:   '#f97316',
  Finanzas:  '#eab308',
  Personal:  '#ec4899',
};

const AREA_ICONS = {
  Agencia: '🏢', Trabajo: '💼', Ejercicio: '💪', Lectura: '📚', Finanzas: '💰', Personal: '🏠'
};

const PRIO_ORDER = { Crítica: 0, Alta: 1, Normal: 2 };
const NOTION_URL = '/.netlify/functions/notion';

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let allTasks    = [];
let clienteMap  = {};
let objetivos   = [];

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
const prop  = (p, k) => p.properties[k];
const title = (p, k = 'Nombre') => prop(p, k)?.title?.[0]?.plain_text || '';
const sel   = (p, k) => prop(p, k)?.select?.name || '';
const txt   = (p, k) => prop(p, k)?.rich_text?.[0]?.plain_text || '';
const dt    = (p, k) => prop(p, k)?.date?.start || '';
const rel   = (p, k) => prop(p, k)?.relation?.map(r => r.id) || [];
const h     = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const DAYS   = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MONTHS = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function todayLabel() {
  const d = new Date();
  return `${DAYS[d.getDay()]}, ${d.getDate()} de ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

function fmtDate(s) {
  if (!s) return '';
  const d  = new Date(s + 'T12:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  return d.toLocaleDateString('es-CO', { day: 'numeric', month: 'short' });
}

function isOverdue(s) {
  if (!s) return false;
  const d = new Date(s + 'T12:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  return d < today;
}

// ══════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════
async function notionQuery(dbId, body = {}) {
  const res = await fetch(NOTION_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ endpoint: `databases/${dbId}/query`, method: 'POST', body }),
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error || `HTTP ${res.status}`); }
  return res.json();
}

async function notionPatch(pageId, properties) {
  const res = await fetch(NOTION_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      endpoint: `pages/${pageId}`,
      method: 'PATCH',
      body: { properties },
    }),
  });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error || `HTTP ${res.status}`); }
  return res.json();
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
let toastTimer;
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2500);
}

// ══════════════════════════════════════════════
//  CHECK OFF TASK
// ══════════════════════════════════════════════
async function checkTask(pageId, btn) {
  btn.classList.add('checking');
  btn.textContent = '✓';

  const row = btn.closest('.task-row');
  row.classList.add('done');

  try {
    await notionPatch(pageId, { Estado: { select: { name: 'Hecho' } } });
    showToast('✅ Tarea marcada como hecha en Notion');

    // remove row after animation
    setTimeout(() => {
      row.style.maxHeight = row.offsetHeight + 'px';
      row.style.overflow = 'hidden';
      row.style.transition = 'max-height .3s, padding .3s, opacity .3s';
      requestAnimationFrame(() => {
        row.style.maxHeight = '0';
        row.style.paddingTop = '0';
        row.style.paddingBottom = '0';
        row.style.opacity = '0';
      });
      setTimeout(() => {
        row.remove();
        // update allTasks
        allTasks = allTasks.filter(t => t.id !== pageId);
        updateStats();
        updateFooter();
      }, 320);
    }, 500);

  } catch (err) {
    row.classList.remove('done');
    btn.classList.remove('checking');
    btn.textContent = '';
    showToast('⚠️ No se pudo actualizar en Notion', 'error');
  }
}

// ══════════════════════════════════════════════
//  RENDER TASKS
// ══════════════════════════════════════════════
function renderTaskRow(task) {
  const pageId  = task.id;
  const name    = title(task, 'Tarea');
  const area    = sel(task, 'Área');
  const prio    = sel(task, 'Prioridad') || 'Normal';
  const estado  = sel(task, 'Estado');
  const fecha   = dt(task, 'Fecha');
  const cIds    = rel(task, 'Cliente');
  const cliente = cIds.length ? (clienteMap[cIds[0]] || '') : '';
  const color   = AREA_COLORS[area] || '#888';
  const icon    = AREA_ICONS[area] || '•';
  const overdue = isOverdue(fecha);

  return `<div class="task-row" data-id="${h(pageId)}" data-area="${h(area)}" data-prio="${h(prio)}" data-name="${h(name.toLowerCase())}">
    <div>
      <button class="check-btn" onclick="checkTask('${h(pageId)}', this)" title="Marcar como hecha"></button>
    </div>
    <div class="task-name-cell">
      <div class="task-name">${h(name)}</div>
    </div>
    <div>
      <span class="area-badge" style="color:${color};border-color:${color}33">
        <span class="area-dot" style="background:${color}"></span>
        ${h(area)}
      </span>
    </div>
    <div class="client-cell">${h(cliente) || '—'}</div>
    <div>
      <span class="prio-badge prio-${h(prio)}">
        <span class="prio-dot"></span>
        ${h(prio)}
      </span>
    </div>
    <div class="date-cell ${overdue ? 'date-past' : ''}">${fmtDate(fecha) || '—'}</div>
  </div>`;
}

function applyFilters() {
  const area   = document.getElementById('filter-area').value;
  const prio   = document.getElementById('filter-prio').value;
  const search = document.getElementById('filter-search').value.toLowerCase().trim();

  const rows = document.querySelectorAll('.task-row');
  let visible = 0;

  rows.forEach(row => {
    const matchArea   = !area   || row.dataset.area === area;
    const matchPrio   = !prio   || row.dataset.prio === prio;
    const matchSearch = !search || row.dataset.name.includes(search);
    const show = matchArea && matchPrio && matchSearch;
    row.style.display = show ? '' : 'none';
    if (show) visible++;
  });

  document.getElementById('filter-count').textContent =
    (area || prio || search) ? `${visible} resultado${visible !== 1 ? 's' : ''}` : '';
}

function updateStats() {
  const pending = allTasks.filter(t => sel(t, 'Estado') !== 'Hecho');
  const crit = pending.filter(t => sel(t, 'Prioridad') === 'Crítica').length;
  const alta = pending.filter(t => sel(t, 'Prioridad') === 'Alta').length;
  document.getElementById('stat-total').textContent = pending.length;
  document.getElementById('stat-crit').textContent  = crit;
  document.getElementById('stat-alta').textContent  = alta;
}

function updateFooter() {
  const rows = document.querySelectorAll('.task-row');
  document.getElementById('footer-count').textContent =
    rows.length ? `${rows.length} tarea${rows.length !== 1 ? 's' : ''} pendiente${rows.length !== 1 ? 's' : ''}` : '';
}

// ══════════════════════════════════════════════
//  RENDER OBJECTIVES
// ══════════════════════════════════════════════
function renderObjectives(objs) {
  const active = objs.filter(o => sel(o, 'Estado') !== 'Completado');
  if (!active.length) return;

  const grid = document.getElementById('obj-grid');
  grid.innerHTML = active.map(o => {
    const area      = sel(o, 'Área');
    const timeframe = sel(o, 'Timeframe');
    const color     = AREA_COLORS[area] || '#888';
    const icon      = AREA_ICONS[area] || '';
    return `<div class="obj-card" style="--accent:${color}">
      <div class="obj-area-label" style="color:${color}">${icon} ${h(area)}</div>
      <div class="obj-timeframe">${h(timeframe)}</div>
      <div class="obj-text">${h(title(o, 'Objetivo'))}</div>
    </div>`;
  }).join('');

  document.getElementById('obj-section').style.display = '';
}

// ══════════════════════════════════════════════
//  OBJECTIVES TOGGLE
// ══════════════════════════════════════════════
function toggleObjectives() {
  const toggle = document.getElementById('obj-toggle');
  const body   = document.getElementById('obj-body');
  toggle.classList.toggle('open');
  body.classList.toggle('open');
}

// ══════════════════════════════════════════════
//  MAIN RENDER
// ══════════════════════════════════════════════
function renderDashboard(tasks, clientes, objs) {
  // build maps
  clientes.forEach(c => { clienteMap[c.id] = title(c, 'Nombre'); });
  allTasks = tasks;

  // filter pending, sort by priority then date
  const pending = tasks
    .filter(t => sel(t, 'Estado') !== 'Hecho')
    .sort((a, b) => {
      const pd = (PRIO_ORDER[sel(a,'Prioridad')]??2) - (PRIO_ORDER[sel(b,'Prioridad')]??2);
      if (pd !== 0) return pd;
      const da = dt(a,'Fecha') || 'z';
      const db = dt(b,'Fecha') || 'z';
      return da.localeCompare(db);
    });

  // render tasks
  const list = document.getElementById('task-list');
  if (pending.length === 0) {
    list.innerHTML = `<div class="empty-row">🎉 Sin tareas pendientes — <a href="https://app.notion.com/p/85993516ae2f4829ade9be901fbea137" target="_blank">agregar en Notion →</a></div>`;
  } else {
    list.innerHTML = pending.map(renderTaskRow).join('');
  }

  // stats
  updateStats();
  updateFooter();

  // objectives
  renderObjectives(objs);
}

// ══════════════════════════════════════════════
//  LOAD
// ══════════════════════════════════════════════
async function loadDashboard() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  try {
    const [tarRes, cliRes, objRes] = await Promise.all([
      notionQuery(DB.tareas,    { sorts: [{ property: 'Prioridad', direction: 'ascending' }] }),
      notionQuery(DB.clientes),
      notionQuery(DB.objetivos, { sorts: [{ property: 'Timeframe', direction: 'ascending' }] }),
    ]);

    renderDashboard(
      tarRes.results || [],
      cliRes.results || [],
      objRes.results || [],
    );
  } catch (err) {
    document.getElementById('task-list').innerHTML = `
      <div class="empty-row">
        ⚠️ Error de conexión: ${h(err.message)}<br>
        <small style="color:#444">Asegúrate de que NOTION_TOKEN esté configurado en Netlify y que la integración tenga acceso a la página Life OS.</small>
      </div>`;
  } finally {
    btn.classList.remove('spinning');
  }
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
document.getElementById('current-date').textContent = todayLabel();
loadDashboard();
</script>
