<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🧠 Life OS — Santi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #f3f4f6;
      --card:   #ffffff;
      --border: #e5e7eb;
      --text:   #111827;
      --sub:    #9ca3af;
      --muted:  #6b7280;
      --r: 12px;
      --rs: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .h-brand h1 { font-size: 18px; font-weight: 700; }
    .h-brand .date { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .h-stats { display: flex; gap: 22px; }
    .stat { text-align: center; }
    .stat .n { font-size: 24px; font-weight: 700; line-height: 1; display: block; }
    .stat .l { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--sub); margin-top: 3px; }
    .stat.crit .n { color: #ef4444; }
    .stat.alta .n { color: #f97316; }
    .h-actions { display: flex; gap: 6px; }
    .icon-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      width: 34px; height: 34px; border-radius: var(--rs); cursor: pointer;
      font-size: 15px; transition: all .2s; display: flex; align-items: center;
      justify-content: center; text-decoration: none;
    }
    .icon-btn:hover { border-color: #d1d5db; color: var(--text); }
    .spinning { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TABS ── */
    .tabs-nav {
      display: flex; gap: 4px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 4px;
      margin-bottom: 14px;
    }
    .tab-btn {
      flex: 1; padding: 9px 12px; font-size: 13px; font-weight: 500;
      border: none; background: transparent; color: var(--muted);
      border-radius: var(--rs); cursor: pointer; transition: all .2s;
      font-family: 'Inter', sans-serif;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { background: #111827; color: #ffffff; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── WEEK BANNER ── */
    .week-banner {
      font-size: 12px; color: var(--muted); font-weight: 500;
      margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .week-right { display: flex; align-items: center; gap: 8px; }
    .week-prog-track {
      width: 80px; height: 4px;
      background: #e5e7eb; border-radius: 2px; overflow: hidden;
    }
    .week-prog-fill { height: 100%; border-radius: 2px; background: #22c55e; transition: width .6s; }
    .week-pct { font-size: 11px; color: var(--muted); }

    /* ── FILTER CHIPS ── */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-chip {
      padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px;
      font-size: 12px; font-weight: 500; cursor: pointer; background: var(--card);
      color: var(--muted); transition: all .15s; font-family: 'Inter', sans-serif;
    }
    .filter-chip:hover { border-color: #d1d5db; color: var(--text); }
    .filter-chip.active { background: #111827; color: white; border-color: #111827; }

    /* ── AREA CARD ── */
    .area-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      border-left: 4px solid transparent;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .area-card-hd {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 16px;
      border-bottom: 1px solid var(--border);
    }
    .area-icon { font-size: 15px; line-height: 1; }
    .area-name { font-size: 13px; font-weight: 600; }
    .area-obj-badge {
      margin-left: auto;
      font-size: 11px; font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      max-width: 280px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    /* ── TASK ROWS ── */
    .task-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #f3f4f6;
      transition: background .1s;
    }
    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: #f9fafb; }

    .check-btn {
      width: 18px; height: 18px; flex-shrink: 0;
      border: 1.5px solid #d1d5db;
      border-radius: 4px; background: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s; font-size: 11px; color: transparent;
    }
    .check-btn:hover { border-color: #22c55e; color: #22c55e; }
    .check-btn:hover::after { content: '✓'; }

    .prio-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .prio-dot.critica { background: #ef4444; }
    .prio-dot.alta    { background: #f97316; }
    .prio-dot.normal  { background: #d1d5db; }

    .task-text { font-size: 13px; color: var(--text); line-height: 1.35; flex: 1; }
    .task-date { font-size: 11px; color: var(--sub); flex-shrink: 0; }
    .task-date.overdue { color: #ef4444; font-weight: 500; }
    .task-no-date { font-size: 10px; color: #d1d5db; flex-shrink: 0; font-style: italic; }
    .rutina-tag {
      font-size: 10px; color: #9ca3af;
      border: 1px solid #e5e7eb; border-radius: 4px;
      padding: 1px 5px; flex-shrink: 0; letter-spacing: 0.2px;
    }

    .area-empty { padding: 11px 16px; font-size: 12px; color: var(--sub); }

    /* ── BACKLOG ── */
    .backlog-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px;
      color: var(--sub); margin: 20px 0 8px 2px;
    }

    /* ── 6 MESES PROGRESS ── */
    .prog-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.7px;
      color: var(--sub); margin-bottom: 12px; padding-left: 2px;
    }
    .prog-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .prog-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px 18px;
    }
    .prog-card-hd { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .prog-icon { font-size: 16px; }
    .prog-area-name { font-size: 14px; font-weight: 700; }
    .prog-target { margin-left: auto; font-size: 11px; color: var(--muted); text-align: right; line-height: 1.3; }
    .prog-months { margin: 0 0 12px; }
    .prog-month-row {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 6px 0; border-bottom: 0.5px solid #f3f4f6;
    }
    .prog-month-row:last-child { border-bottom: none; }
    .prog-month-tag {
      font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 4px;
      flex-shrink: 0; min-width: 34px; text-align: center;
      letter-spacing: 0.3px; text-transform: uppercase;
    }
    .prog-month-text { font-size: 12px; color: var(--text); line-height: 1.5; }
    .prog-track { background: #e5e7eb; border-radius: 6px; height: 5px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 6px; transition: width 1.2s ease; }
    .prog-meta { display: flex; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--muted); }
    .prog-pct { font-weight: 600; }

    /* ── EMPTY / TOAST ── */
    .empty-state { padding: 32px; text-align: center; color: var(--sub); font-size: 13px; }
    #toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #111827; color: white;
      border-radius: var(--rs); padding: 10px 16px; font-size: 13px;
      opacity: 0; transform: translateY(8px); transition: all .3s;
      pointer-events: none; z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    @keyframes fadeOut { to { opacity: 0; transform: translateX(20px); } }
    .fading { animation: fadeOut .35s forwards; }
  </style>
</head>

<script>
// ════════════════════════════════
//  CONFIG
// ════════════════════════════════
const DB = {
  clientes:  'bbeedd0068e640518c707ef9c9721b5c',
  objetivos: '6020a66ec0954a489031516597ac9fb1',
  tareas:    '85993516ae2f4829ade9be901fbea137',
};
const AREA_COLORS = {

  Lectura: '#f97316', Finanzas: '#eab308', Personal: '#ec4899',
};
const AREA_ICONS = {
  Agencia: '🏢', Trabajo: '💼', Ejercicio: '💪',
  Lectura: '📚', Finanzas: '💰', Personal: '🏠',
};
const AREA_ORDER = ['Agencia','Trabajo','Ejercicio','Finanzas','Lectura','Personal'];
const PRIO_ORDER = { Crítica: 0, Alta: 1, Normal: 2 };
const SEMESTRAL_TARGETS = {
  Agencia:   '10 clientes retainer',
  Trabajo:   '3 módulos + 2-5 upsells/mes',
  Ejercicio: '+3kg músculo · panza eliminada',
  Finanzas:  '$40k ahorrados',
  Lectura:   '5 libros leídos',
  Personal:  'Boda planeada',
};
const MES_ORDER = { JULIO:0, AGOSTO:1, SEPTIEMBRE:2, OCTUBRE:3, NOVIEMBRE:4, DICIEMBRE:5 };
const MES_LABEL = { JULIO:'Jul', AGOSTO:'Ago', SEPTIEMBRE:'Sep', OCTUBRE:'Oct', NOVIEMBRE:'Nov', DICIEMBRE:'Dic' };
const NOTION_URL = '/.netlify/functions/notion';

// ════════════════════════════════
//  RUTINAS (virtual — no Notion)
//  dias: 0=Dom 1=Lun 2=Mar 3=Mié 4=Jue 5=Vie 6=Sáb
// ════════════════════════════════
const RUTINAS = [
  { nombre: '🏋️ Ir al gym',                          area: 'Ejercicio', prio: 'Normal', dias: [1,3,5] },
  { nombre: '📚 Leer 20-30 páginas',                   area: 'Lectura',   prio: 'Normal', dias: [1]     },
  { nombre: '💰 Revisión finanzas (10 min)',            area: 'Finanzas',  prio: 'Alta',   dias: [0]     },
  { nombre: '📋 Revisión semanal + plan próx. semana', area: 'Personal',  prio: 'Alta',   dias: [0]     },
];

// Names to filter out from Notion if they still exist there
const RUTINA_NAMES = new Set([
  '🏋️ Ir al gym',
  '📚 Leer 20-30 páginas',
  '💰 Revisión finanzas (10 min)',
  '📋 Revisión semanal + plan próxima semana',
  '📋 Revisión semanal + plan próx. semana',
]);

// ════════════════════════════════
//  STATE
// ════════════════════════════════
let allTasks      = [];
let allFetched    = [];
let allObjetivos  = [];
let clienteMap    = {};
let doneIds       = new Set();
let doneVirtualIds = new Set();
let activeFilter  = { semanal: '', mensual: '' };

// ════════════════════════════════
//  NOTION API
// ════════════════════════════════
async function notionQuery(dbId) {
  let results = [], cursor;
  do {
    const body = { page_size: 100 };
    if (cursor) body.start_cursor = cursor;
    const r = await fetch(NOTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint: `databases/${dbId}/query`, method: 'POST', body }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.message || d.error || 'Error Notion');
    results = results.concat(d.results || []);
    cursor = d.has_more ? d.next_cursor : undefined;
  } while (cursor);
  return results;
}

async function notionPatch(pageId, properties) {
  const r = await fetch(NOTION_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ endpoint: `pages/${pageId}`, method: 'PATCH', body: { properties } }),
  });
  if (!r.ok) { const d = await r.json(); throw new Error(d.message || 'Patch error'); }
}

// ════════════════════════════════
//  PROPERTY HELPERS
// ════════════════════════════════
const prop = (p, k) => p.properties?.[k];
const ttl  = (p, k) => prop(p, k)?.title?.[0]?.plain_text || '';
const sel  = (p, k) => prop(p, k)?.select?.name || '';
const dt   = (p, k) => prop(p, k)?.date?.start || '';
const h    = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ════════════════════════════════
//  DATE UTILS
// ════════════════════════════════
function weekRange() {
  const now = new Date(), day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const s = new Date(now); s.setDate(now.getDate() + diff); s.setHours(0,0,0,0);
  const e = new Date(s);   e.setDate(s.getDate() + 6);      e.setHours(23,59,59,999);
  return { s, e };
}
function monthRange() {
  const now = new Date();
  const s = new Date(now.getFullYear(), now.getMonth(), 1, 0, 0, 0, 0);
  const e = new Date(now.getFullYear(), now.getMonth()+1, 0, 23, 59, 59, 999);
  return { s, e };
}
function isThisWeek(d) {
  if (!d) return false;
  const ts = new Date(d + 'T12:00:00'), { s, e } = weekRange();
  return ts >= s && ts <= e;
}
function isThisMonth(d) {
  if (!d) return false;
  const ts = new Date(d + 'T12:00:00'), now = new Date();
  return ts.getMonth() === now.getMonth() && ts.getFullYear() === now.getFullYear();
}
function isOverdue(d) {
  if (!d) return false;
  return new Date(d + 'T23:59:59') < new Date();
}
function fmtDate(d) {
  if (!d) return '';
  return new Date(d + 'T12:00:00').toLocaleDateString('es-CO', { weekday:'short', day:'numeric', month:'short' });
}
function fmtWeekRange() {
  const { s, e } = weekRange(), o = { day:'numeric', month:'short' };
  const wn = Math.ceil(((new Date() - new Date(new Date().getFullYear(),0,1)) / 86400000 + new Date(new Date().getFullYear(),0,1).getDay() + 1) / 7);
  return `Semana ${wn} · ${s.toLocaleDateString('es-CO',o)} – ${e.toLocaleDateString('es-CO',o)}`;
}

// ════════════════════════════════
//  RUTINAS GENERATOR
// ════════════════════════════════
function generateRutinas(start, end) {
  const virtuals = [];
  const cur = new Date(start);
  cur.setHours(12, 0, 0, 0);
  while (cur <= end) {
    const dow   = cur.getDay();
    const fecha = cur.toISOString().slice(0, 10);
    for (const r of RUTINAS) {
      if (r.dias.includes(dow)) {
        virtuals.push({
          _virtual: true,
          _id:      `rutina-${r.area}-${fecha}`,
          _nombre:  r.nombre,
          _area:    r.area,
          _prio:    r.prio,
          _fecha:   fecha,
        });
      }
    }
    cur.setDate(cur.getDate() + 1);
  }
  return virtuals;
}

function getPrio(t) {
  return t._virtual ? t._prio : (sel(t, 'Prioridad') || 'Normal');
}

// ════════════════════════════════
//  TOAST
// ════════════════════════════════
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ════════════════════════════════
//  CHECK REAL TASK (Notion)
// ════════════════════════════════
async function checkTask(pageId, btn) {
  btn.innerHTML = '✓';
  btn.style.cssText += 'border-color:#22c55e;color:#22c55e;';
  btn.disabled = true;
  const item = btn.closest('.task-item');
  item.style.opacity = '.4';
  try {
    await notionPatch(pageId, { Estado: { select: { name: 'Hecho' } } });
    toast('✅ Tarea marcada como hecha en Notion');
    item.classList.add('fading');
    doneIds.add(pageId);
    setTimeout(() => {
      item.remove();
      allTasks = allTasks.filter(t => t.id !== pageId);
      updateStats();
      updateWeekProgress();
    }, 380);
  } catch(e) {
    btn.innerHTML = ''; btn.style.cssText = ''; btn.disabled = false;
    item.style.opacity = '1';
    toast('⚠️ Error al actualizar');
  }
}

// ════════════════════════════════
//  CHECK RUTINA (virtual — local only)
// ════════════════════════════════
function checkRutina(vId, btn) {
  btn.innerHTML = '✓';
  btn.style.cssText += 'border-color:#22c55e;color:#22c55e;';
  btn.disabled = true;
  const item = btn.closest('.task-item');
  item.style.opacity = '.4';
  doneVirtualIds.add(vId);
  item.classList.add('fading');
  toast('✅ Rutina completada');
  setTimeout(() => {
    item.remove();
    updateStats();
    updateWeekProgress();
  }, 380);
}

// ════════════════════════════════
//  TABS
// ════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
  });
});

// ════════════════════════════════
//  FILTER CHIPS
// ════════════════════════════════
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const tab = chip.dataset.tab, area = chip.dataset.area;
    activeFilter[tab] = area;
    document.querySelectorAll(`.filter-chip[data-tab="${tab}"]`)
      .forEach(c => c.classList.toggle('active', c.dataset.area === area));
    const containers = tab === 'semanal'
      ? ['areas-semanal', 'areas-backlog']
      : [`areas-${tab}`];
    containers.forEach(cid => {
      document.querySelectorAll(`#${cid} .area-card`).forEach(card => {
        card.style.display = (!area || card.dataset.area === area) ? '' : 'none';
      });
    });
  });
});

// ════════════════════════════════
//  BUILD TASK ITEM HTML
// ════════════════════════════════
function taskItemHtml(task) {
  // Virtual rutina
  if (task._virtual) {
    const prioClass = task._prio === 'Crítica' ? 'critica' : task._prio === 'Alta' ? 'alta' : 'normal';
    return `<div class="task-item" data-id="${h(task._id)}">
      <button class="check-btn" onclick="checkRutina('${h(task._id)}',this)"></button>
      <span class="prio-dot ${prioClass}"></span>
      <span class="task-text">${h(task._nombre)}</span>
      <span class="rutina-tag">rutina</span>
      <span class="task-date">${fmtDate(task._fecha)}</span>
    </div>`;
  }
  // Real Notion task
  const id    = task.id;
  const name  = ttl(task, 'Tarea');
  const prio  = sel(task, 'Prioridad') || 'Normal';
  const fecha = dt(task, 'Fecha');
  const over  = fecha && isOverdue(fecha);
  const prioClass = prio === 'Crítica' ? 'critica' : prio === 'Alta' ? 'alta' : 'normal';
  const dateHtml = fecha
    ? `<span class="task-date ${over ? 'overdue' : ''}">${fmtDate(fecha)}</span>`
    : `<span class="task-no-date">sin fecha</span>`;
  return `<div class="task-item" data-id="${h(id)}">
    <button class="check-btn" onclick="checkTask('${h(id)}',this)"></button>
    <span class="prio-dot ${prioClass}"></span>
    <span class="task-text">${h(name)}</span>
    ${dateHtml}
  </div>`;
}

// ════════════════════════════════
//  BUILD AREA CARD HTML
// ════════════════════════════════
function areaCardHtml(area, tasks, objText) {
  const color = AREA_COLORS[area] || '#888';
  const icon  = AREA_ICONS[area]  || '•';
  const clean = objText.replace(/^\[.*?\]\s*/, '');
  const badge = clean.length > 55 ? clean.slice(0,53) + '…' : clean;

  const sorted = [...tasks].sort((a, b) => {
    const pd = (PRIO_ORDER[getPrio(a)] ?? 2) - (PRIO_ORDER[getPrio(b)] ?? 2);
    if (pd !== 0) return pd;
    const da = a._virtual ? a._fecha : dt(a,'Fecha');
    const db = b._virtual ? b._fecha : dt(b,'Fecha');
    return (da||'').localeCompare(db||'');
  });

  return `<div class="area-card" data-area="${h(area)}" style="border-left-color:${color}">
    <div class="area-card-hd">
      <span class="area-icon">${icon}</span>
      <span class="area-name" style="color:${color}">${h(area)}</span>
      ${badge ? `<span class="area-obj-badge" style="color:${color};background:${color}18">${h(badge)}</span>` : ''}
    </div>
    ${sorted.length
      ? sorted.map(taskItemHtml).join('')
      : '<div class="area-empty">Sin tareas programadas</div>'
    }
  </div>`;
}

// ════════════════════════════════
//  RENDER AREA GROUPS (real + virtual)
// ════════════════════════════════
function renderAreaGroups(tab, containerId, timeframe) {
  const el = document.getElementById(containerId);
  if (!el) return;

  const isWeek   = tab === 'semanal';
  const filterFn = isWeek ? isThisWeek : isThisMonth;
  const range    = isWeek ? weekRange() : monthRange();

  const objs = allObjetivos.filter(o =>
    sel(o,'Timeframe') === timeframe && sel(o,'Estado') === 'En progreso'
  );

  let html = '';
  for (const area of AREA_ORDER) {
    // Real tasks from Notion
    const realTasks = allTasks.filter(t =>
      sel(t,'Área') === area && filterFn(dt(t,'Fecha'))
    );
    // Virtual rutinas for this period
    const virtTasks = generateRutinas(range.s, range.e).filter(v =>
      v._area === area && !doneVirtualIds.has(v._id)
    );
    const combined = [...realTasks, ...virtTasks];

    const obj     = objs.find(o => sel(o,'Área') === area);
    const objText = obj ? ttl(obj,'Objetivo') : '';

    if (!combined.length && !objText) continue;
    html += areaCardHtml(area, combined, objText);
  }

  el.innerHTML = html || '<div class="empty-state">No hay tareas pendientes 🎉</div>';

  const area = activeFilter[tab] || '';
  if (area) {
    el.querySelectorAll('.area-card').forEach(card => {
      card.style.display = card.dataset.area === area ? '' : 'none';
    });
  }
}

// ════════════════════════════════
//  RENDER BACKLOG (no date, real only)
// ════════════════════════════════
function renderBacklog() {
  const backlogTasks = allTasks.filter(t => !dt(t,'Fecha'));
  const section = document.getElementById('backlog-section');
  const el = document.getElementById('areas-backlog');
  if (!el || !section) return;

  if (!backlogTasks.length) { section.style.display = 'none'; return; }
  section.style.display = '';

  let html = '';
  for (const area of AREA_ORDER) {
    const tasks = backlogTasks.filter(t => sel(t,'Área') === area);
    if (!tasks.length) continue;
    html += areaCardHtml(area, tasks, '');
  }
  el.innerHTML = html || '';
}

// ════════════════════════════════
//  RENDER 6 MESES PROGRESS
// ════════════════════════════════
function renderProgress() {
  const el = document.getElementById('prog-semestral');
  if (!el) return;

  el.innerHTML = AREA_ORDER.map(area => {
    const color  = AREA_COLORS[area] || '#888';
    const icon   = AREA_ICONS[area]  || '•';
    const aTask  = allFetched.filter(t =>
      sel(t,'Área') === area && !RUTINA_NAMES.has(ttl(t,'Tarea'))
    );
    const done   = aTask.filter(t => sel(t,'Estado') === 'Hecho' || doneIds.has(t.id));
    const pct    = aTask.length ? Math.round(done.length / aTask.length * 100) : 0;
    const target = SEMESTRAL_TARGETS[area] || '';

    // Pull monthly objectives — sorted by Date field from Notion
    const MES_SHORT = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const monthlyObjs = allObjetivos
      .filter(o => sel(o,'Área') === area)
      .map(o => {
        const fecha = dt(o, 'Date');
        if (!fecha) return null;
        const d = new Date(fecha + 'T12:00:00');
        return {
          mesLabel: MES_SHORT[d.getMonth() + 1] || '?',
          texto:    ttl(o, 'Objetivo'),
          order:    d.getTime(),
        };
      })
      .filter(Boolean)
      .sort((a, b) => a.order - b.order);

    const monthsHtml = monthlyObjs.length
      ? monthlyObjs.map(m => `
          <div class="prog-month-row">
            <span class="prog-month-tag" style="background:${color}18;color:${color}">${h(m.mesLabel)}</span>
            <span class="prog-month-text">${h(m.texto)}</span>
          </div>`).join('')
      : `<div class="prog-month-row">
          <span class="prog-month-text" style="color:var(--sub)">Sin objetivos mensuales aún</span>
        </div>`;

    return `<div class="prog-card">
      <div class="prog-card-hd">
        <span class="prog-icon">${icon}</span>
        <span class="prog-area-name" style="color:${color}">${h(area)}</span>
        <span class="prog-target">${h(target)}</span>
      </div>
      <div class="prog-months">${monthsHtml}</div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
      <div class="prog-meta">
        <span>${done.length}/${aTask.length} tareas</span>
        <span class="prog-pct" style="color:${color}">${pct}%</span>
      </div>
    </div>`;
  }).join('');
}

// ════════════════════════════════
//  STATS + WEEK PROGRESS
// ════════════════════════════════
function updateStats() {
  const { s, e } = weekRange();
  const realWeek = allTasks.filter(t => isThisWeek(dt(t,'Fecha')));
  const virtWeek = generateRutinas(s, e).filter(v => !doneVirtualIds.has(v._id));

  const total = realWeek.length + virtWeek.length;
  const crit  = realWeek.filter(t => sel(t,'Prioridad') === 'Crítica').length;
  const alta  = realWeek.filter(t => sel(t,'Prioridad') === 'Alta').length
              + virtWeek.filter(v => v._prio === 'Alta').length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-crit').textContent  = crit;
  document.getElementById('stat-alta').textContent  = alta;
}

function updateWeekProgress() {
  const { s, e } = weekRange();
  const realWeekAll = allFetched.filter(t =>
    isThisWeek(dt(t,'Fecha')) && !RUTINA_NAMES.has(ttl(t,'Tarea'))
  );
  const realDone = realWeekAll.filter(t => sel(t,'Estado') === 'Hecho' || doneIds.has(t.id));

  const virtWeekAll = generateRutinas(s, e);
  const virtDone    = virtWeekAll.filter(v => doneVirtualIds.has(v._id));

  const total = realWeekAll.length + virtWeekAll.length;
  const done  = realDone.length + virtDone.length;
  const pct   = total ? Math.round(done / total * 100) : 0;

  document.getElementById('week-prog-fill').style.width = pct + '%';
  document.getElementById('week-pct').textContent = pct + '% completado';
}

// ════════════════════════════════
//  LOAD DASHBOARD
// ════════════════════════════════
async function loadDashboard() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  document.getElementById('areas-semanal').innerHTML = '<div class="empty-state">Cargando…</div>';
  doneIds        = new Set();
  doneVirtualIds = new Set();

  try {
    const [clientes, objetivos, tareas] = await Promise.all([
      notionQuery(DB.clientes),
      notionQuery(DB.objetivos),
      notionQuery(DB.tareas),
    ]);

    clienteMap  = {};
    clientes.forEach(c => { clienteMap[c.id] = ttl(c,'Nombre'); });

    allObjetivos = objetivos;
    allFetched   = tareas;

    // Exclude rutinas (they live in the dashboard now) and done tasks
    allTasks = tareas.filter(t =>
      sel(t,'Estado') !== 'Hecho' && !RUTINA_NAMES.has(ttl(t,'Tarea'))
    );

    renderAreaGroups('semanal', 'areas-semanal', 'Semanal');
    renderAreaGroups('mensual', 'areas-mensual', 'Mensual');
    renderBacklog();
    renderProgress();
    updateStats();
    updateWeekProgress();

    document.getElementById('week-range').textContent = fmtWeekRange();

  } catch(e) {
    document.getElementById('areas-semanal').innerHTML =
      `<div class="empty-state">⚠️ Error de conexión<br><small style="color:#9ca3af;margin-top:6px;display:block">${h(e.message)}</small></div>`;
  }

  btn.classList.remove('spinning');
}

// ════════════════════════════════
//  INIT
// ════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  document.getElementById('header-date').textContent =
    now.toLocaleDateString('es-CO', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  loadDashboard();
});
</script>
